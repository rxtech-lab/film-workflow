name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ios:
    name: Build iOS
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project film-workflow.xcodeproj \
            -scheme film-workflow \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  build-macos:
    name: Build macOS
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Build for macOS
        run: |
          xcodebuild build \
            -project film-workflow.xcodeproj \
            -scheme film-workflow \
            -destination 'generic/platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
